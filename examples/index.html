<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snipe Label Playground</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f0f0; }
        .controls { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 10px; }
        canvas { border: 1px solid #ccc; background: white; max-width: 100%; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>
    <h2>Snipe Label Tester</h2>
    <div class="controls">
        <div class="input-group">
            <label>Label Size</label>
            <select id="labelSize" style="width: 100%">
                <option value="1050x425">89 × 36 mm (1050 × 425 px)</option>
                <option value="1051x331">89 × 28 mm (1051 × 331 px)</option>
                <option value="1193x638">101 × 54 mm (1193 × 638 px)</option>
                <option value="732x343">62 × 29 mm (732 × 343 px)</option>
                <option value="638x295">54 × 25 mm (638 × 295 px)</option>
            </select>
        </div>
        <div class="input-group">
            <label>QR Value</label>
            <input type="text" id="qrValue" value="ASSET-123456" style="width: 100%">
        </div>
        <div class="input-group">
            <label>Label Text (JSON format)</label>
            <textarea id="labelText" rows="5" style="width: 100%">[
  {"text": "COMPANY NAME", "wrap": true, "fontSize": 40},
  {"text": "Asset: MacBook Pro 16", "wrap": true, "fontSize": 30},
  {"text": "SN: C02X12345678", "wrap": true, "fontSize": 24}
]</textarea>
        </div>
        <button id="generateBtn">Generate Label</button>
        <button id="downloadBtn">Download PNG</button>
    </div>

    <div id="canvasContainer"></div>

    <script type="module" src="/dist/examples/example.js" > </script>
</body>
</html>
