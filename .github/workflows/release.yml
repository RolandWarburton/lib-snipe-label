name: Release

# Trigger on pushing a version tag, e.g. `git tag v0.1.5 && git push origin v0.1.5`
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub release
      id-token: write # OIDC auth for `deno publish` to JSR (no token needed)

    steps:
      - uses: actions/checkout@v4

      - name: Install Deno
        run: |
          curl -fsSL https://deno.land/install.sh | sh -s v2.7.14
          echo "$HOME/.deno/bin" >> "$GITHUB_PATH"

      # Fail early if the tag doesn't match the version in deno.json
      - name: Verify tag matches deno.json version
        run: |
          VERSION="$(deno eval 'console.log(JSON.parse(Deno.readTextFileSync("deno.json")).version)')"
          if [ "v$VERSION" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match deno.json version v$VERSION" >&2
            exit 1
          fi

      # Catch packaging errors before anything is published externally
      - name: Preflight JSR publish
        run: deno publish --dry-run

      - name: Publish to JSR
        run: deno publish

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "Version ${GITHUB_REF_NAME}" \
            --generate-notes \
            --latest
